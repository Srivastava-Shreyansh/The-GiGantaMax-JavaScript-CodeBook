<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Validator</title>
    <link rel="stylesheet" href="03_form_validation._project_1.css">
</head>

<body>

    <div class="container">
        <form class="form">

            <h1>Login</h1>

            <div class="input-group">
                <label>Email</label>
                <input autocomplete="off" type="text" id="email" placeholder="Enter your email">
                <small id="email-msg"></small>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password">
                <small id="password-msg"></small>
            </div>

            <button type="submit">Login</button>

            <div id="resultMsg"></div>

        </form>
    </div>

    <script src="03_form_validation._project_1.js"></script>
</body>

</html>
