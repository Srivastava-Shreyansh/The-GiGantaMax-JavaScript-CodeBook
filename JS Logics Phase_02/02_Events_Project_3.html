<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Submission & Display</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 300;
        }
        html, body{
            width: 100%;
            height: 100%;
        }
        #main{
            width: 100%;
            height: 100%;
            padding: 30px;
            background-color: #555;
            color: aliceblue;
        }
        .card{
            max-width: 300px;
            margin-top: 40px;
            padding: 14px;
            border: 2px solid #e9e9e9;
            border-radius: 15px;
            display: inline-block;
        }
        .profile{
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .profile img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card h4{
            margin-top: 3px;
        }
        .card p{
            margin-top: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="main">
        <form action="">
            <input type="text" placeholder = "Profile Pic">
            <input type="text" placeholder = "Full Name">
            <input type="text" placeholder = "Occupation">
            <input type="text" placeholder = "Brief Description">
            <input type="submit">
        </form>
    </div>
    <script src="02_Events_Project_3.js"></script>
</body>
</html>
