    <title>Cursor Follower</title>
    <link

  rel="stylesheet">
    <style>
        body{
            position: relative;
            overflow: hidden;
        }
        #main{
            width: 40px;
            height: 40px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            background-color: black;
            border: 2px solid wheat;
            border-radius: 50%;
            transition: all cubic-bezier(0.19, 1, 0.22, 1) 1s;
            cursor: none;
        }
    </style>
</head>
