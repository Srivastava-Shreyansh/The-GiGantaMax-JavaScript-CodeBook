<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customized File Upload Button</title>
</head>
<style>
        * {
            margin: 0;
            padding: 0;
            font-family: Helvetica, Arial, sans-serif;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
        }
        #main{
            height: 100%;
            width: 100%;
            background-color: #555;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1{
            font-size: 10rem;
            font-weight: 300;
            user-select: none;
        }
        input{
            display: none;
        }
        #btn{
            border: 2px solid white;
            padding: 12px 24px;
            border-radius: 5px;
            background-color: rgb(40, 178, 40);
            user-select: none;
        }
        #btn:hover{
            background-color: rgb(12, 44, 12);
        }
    </style>
<body>
    <div id="main">
        <input type = "file" id = "fileInput">
        <div id="btn">
            Upload FILE
        </div>
    </div>
    <script src="02_Events_Project_2.js"></script>
</body>
</html>
