<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Optimization</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            max-width: 700px;
            margin: auto;
            padding: 20px;
        }

        .spacer {
            height: 600px;
        }

        .lazy-img {
            width: 100%;
            display: block;
            margin: 30px 0;

            opacity: 0;
            transform: translateY(40px);
            filter: blur(8px);

            transition:
                opacity .6s ease,
                transform .6s ease,
                filter .6s ease;
        }

        .lazy-img.loaded {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
        }
    </style>
</head>

<body> <!-- <input type="text" placeholder="Enter text..."> -->
    <h1>Lazy Loading Images using <i>IntersectionObserver</i></h1>
    <div class="container">
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Hic in quisquam libero? Scroll Down to see images
            load only when they enter the viewport🫵 </p>
