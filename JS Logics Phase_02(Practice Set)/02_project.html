<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="02_project.css">
</head>
<body>
    <div id="container">
        <div id="main">
        <h1>a</h1>
    </div>
        <div class="to-do-list">
            <h1>TO-DO LIST</h1>
            
            <div class="input-container">
                <form class="input-area" onsubmit="return false;">
                    <input autocomplete="off" type="text" id="task-input" placeholder="Add a new task...">
                </form>
                <button id="btn">+</button>
            </div>

            <div>
                <ul id="task-list">
                </ul>
            </div>
        </div>
    </div>
    <script src="02_project.js"></script>
</body>
</html>
