<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Report Card Dashboard</title>

    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 200;
        }

        #main {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid crimson;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,.2);
            text-align: center;
            width: 450px;
        }

        button{
            padding:10px 15px;
            margin:5px;
        }

        button:hover{
            cursor:pointer;
            transform:scale(1.05);
            transition:.3s;
        }

        #report{
            margin-top:25px;
            background:#f7f7f7;
            padding:15px;
            border-radius:10px;
            text-align:left;
            min-height:150px;
            white-space:pre-wrap;
        }
    </style>

</head>

<body>

<div id="main">

    <h1>Student Report Card Dashboard</h1>

    <button id="btn1">Show Student_01</button>
    <button id="btn2">Show Student_02</button>
    <button id="btn3">Show Student_03</button>

    <pre id="report">
Click on one of these buttons ☝️
    </pre>

</div>

<script src="02_student_reportCard_dashboard.js"></script>

</body>
</html>
